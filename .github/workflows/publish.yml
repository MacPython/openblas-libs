name: Publish scipy_openblasN wheels

on:
  pull_request:
    branches:
      - main
      - maintenance/**
  workflow_dispatch:
    inputs:
      environment:
        description: Which PyPI environment to upload to, if any
        required: true
        type: choice
        options: [ "none", "testpypi", "pypi" ]


permissions:
  contents: read # to fetch code (actions/checkout)


jobs:
  call-posix:
    uses: MacPython/openblas-libs/.github/workflows/posix.yml@main

    #  call-posix:
    #    - name: Set up Flang and pkgconf for ARM64
    #      uses: ./.github/posix.yml
